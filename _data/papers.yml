- title: "Subgroups with all finite lifts isomorphic are conjugate"
  url: "https://arxiv.org/abs/2602.15463"
  authors: "Ido Karshon, Alexander Lubotzky, D. B. McReynolds, Alan W. Reid, and Mark Shusterman"
  comments: >
    We show that when two subgroups of a finite group are non-conjugate,
    there exists an extension where their pre-images are not isomorphic.
    This resolves a question by Dipendra Prasad.

- title: "Pro-ℓ-by-cyclotomic and tamely ramified variants of the Neukirch-Uchida Theorem"
  url: "https://arxiv.org/abs/2601.01251"
  authors: "Master's thesis, supervised by Mark Shusterman"
  comments: >
    We show that the isomorphism type of a number field can be recovered
    from the maximal pro-ℓ-by-cyclotomic quotient of its absolute Galois group,
    and also from the maximal tamely ramified quotient.
